<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instructor Dashboard – Coursili</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="coursili_db.js"></script>
  <style>
    :root{--bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--accent:#6c63ff;--accent2:#ff6b6b;--accent3:#43e97b;--text:#f0f0f8;--muted:#8888aa;--border:rgba(108,99,255,0.18);--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif}
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--fb);font-weight:300;line-height:1.6;overflow-x:hidden;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4}

    /* ── SIDEBAR ── */
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;transition:transform .3s}
    .sidebar-logo{padding:1.5rem 1.5rem 1rem;border-bottom:1px solid var(--border)}
    .sidebar-logo a{font-family:var(--fh);font-size:1.4rem;font-weight:800;color:var(--text);text-decoration:none}
    .sidebar-logo a span{color:var(--accent)}
    .sidebar-logo p{font-size:.7rem;color:var(--muted);margin-top:.2rem;text-transform:uppercase;letter-spacing:.08em}
    .sidebar-user{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.8rem}
    .su-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;font-size:.95rem;color:#fff;flex-shrink:0}
    .su-info .name{font-family:var(--fh);font-size:.88rem;font-weight:700}
    .su-info .role-badge{font-size:.65rem;background:rgba(108,99,255,.18);color:var(--accent);padding:.15rem .5rem;border-radius:50px;text-transform:uppercase;letter-spacing:.06em;display:inline-block;margin-top:.15rem}
    .sidebar-nav{flex:1;padding:1rem 0;overflow-y:auto}
    .nav-section{padding:.5rem 1.5rem .3rem;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:500}
    .nav-item{display:flex;align-items:center;gap:.75rem;padding:.65rem 1.5rem;color:var(--muted);text-decoration:none;font-size:.85rem;transition:background .15s,color .15s;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:var(--fb);position:relative}
    .nav-item:hover{background:var(--card);color:var(--text)}
    .nav-item.active{background:rgba(108,99,255,.12);color:var(--accent)}
    .nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
    .nav-item i{width:16px;text-align:center;font-size:.88rem}
    .nav-badge{margin-left:auto;background:var(--accent2);color:#fff;font-size:.65rem;font-weight:700;padding:.1rem .45rem;border-radius:50px}
    .sidebar-footer{padding:1rem 1.5rem;border-top:1px solid var(--border)}
    .btn-signout{display:flex;align-items:center;gap:.6rem;color:var(--accent2);font-size:.83rem;cursor:pointer;background:none;border:none;font-family:var(--fb);transition:opacity .2s;width:100%}
    .btn-signout:hover{opacity:.75}
    .btn-home{display:flex;align-items:center;gap:.6rem;color:var(--muted);font-size:.83rem;text-decoration:none;margin-bottom:.6rem;transition:color .2s}
    .btn-home:hover{color:var(--text)}
    /* ── MAIN ── */
    .main{margin-left:240px;min-height:100vh;position:relative;z-index:1}
    .topbar{background:rgba(10,10,15,.8);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
    .topbar h1{font-family:var(--fh);font-size:1.2rem;font-weight:800}
    .topbar-right{display:flex;align-items:center;gap:1rem}
    .topbar-date{font-size:.8rem;color:var(--muted)}
    .content{padding:2rem}
    /* ── STAT CARDS ── */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.4rem;position:relative;overflow:hidden;transition:border-color .3s,transform .3s}
    .stat-card:hover{border-color:var(--accent);transform:translateY(-3px)}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0}
    .stat-card.c1::before{background:var(--accent)}
    .stat-card.c2::before{background:var(--accent3)}
    .stat-card.c3::before{background:var(--accent2)}
    .stat-card.c4::before{background:#fbbf24}
    .stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:.9rem}
    .stat-card.c1 .stat-icon{background:rgba(108,99,255,.15);color:var(--accent)}
    .stat-card.c2 .stat-icon{background:rgba(67,233,123,.15);color:var(--accent3)}
    .stat-card.c3 .stat-icon{background:rgba(255,107,107,.15);color:var(--accent2)}
    .stat-card.c4 .stat-icon{background:rgba(251,191,36,.15);color:#fbbf24}
    .stat-val{font-family:var(--fh);font-size:1.8rem;font-weight:800;margin-bottom:.2rem}
    .stat-lbl{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .stat-change{font-size:.72rem;margin-top:.4rem;display:flex;align-items:center;gap:.25rem}
    .stat-change.up{color:var(--accent3)}
    .stat-change.down{color:var(--accent2)}
    /* ── SECTION CARDS ── */
    .section-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
    .section-card h2{font-family:var(--fh);font-size:1rem;font-weight:700;margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem}
    .section-card h2 i{color:var(--accent);font-size:.9rem}
    /* ── MINI CHART (CSS bars) ── */
    .chart-wrap{display:flex;align-items:flex-end;gap:4px;height:80px;padding:.5rem 0}
    .chart-bar{flex:1;background:rgba(108,99,255,.25);border-radius:4px 4px 0 0;position:relative;transition:background .2s;cursor:pointer;min-width:0}
    .chart-bar:hover{background:var(--accent)}
    .chart-bar .tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.68rem;padding:.2rem .45rem;border-radius:5px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s}
    .chart-bar:hover .tooltip{opacity:1}
    .chart-labels{display:flex;gap:4px;margin-top:.35rem}
    .chart-labels span{flex:1;text-align:center;font-size:.6rem;color:var(--muted);min-width:0}
    /* ── COURSE TABLE ── */
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{width:100%;border-collapse:collapse;font-size:.83rem}
    thead tr{border-bottom:1px solid var(--border)}
    th{padding:.65rem 1rem;text-align:left;font-family:var(--fh);font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
    td{padding:.75rem 1rem;border-bottom:1px solid rgba(108,99,255,.07);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(108,99,255,.04)}
    .course-emoji-cell{font-size:1.4rem}
    .badge-pub{background:rgba(67,233,123,.15);color:var(--accent3);font-size:.68rem;padding:.18rem .55rem;border-radius:50px;font-weight:600;white-space:nowrap}
    .badge-draft{background:rgba(136,136,170,.1);color:var(--muted);font-size:.68rem;padding:.18rem .55rem;border-radius:50px;font-weight:600}
    .prog-cell{display:flex;align-items:center;gap:.5rem}
    .prog-bar-sm{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;width:60px;flex-shrink:0}
    .prog-fill-sm{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:3px}
    /* ── STUDENTS TABLE ── */
    .student-row{display:flex;align-items:center;gap:.8rem;padding:.65rem 0;border-bottom:1px solid rgba(108,99,255,.06)}
    .student-row:last-child{border-bottom:none}
    .s-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;font-size:.8rem;color:#fff;flex-shrink:0}
    .s-name{font-size:.85rem;font-weight:500}
    .s-email{font-size:.75rem;color:var(--muted)}
    .s-course{font-size:.75rem;color:var(--accent);margin-left:auto;text-align:right;max-width:140px}
    .s-price{font-family:var(--fh);font-size:.82rem;font-weight:700;color:var(--accent3);flex-shrink:0;margin-left:.5rem}
    /* ── MESSAGES ── */
    .msg-row{padding:.8rem 0;border-bottom:1px solid rgba(108,99,255,.06);display:flex;align-items:flex-start;gap:.8rem}
    .msg-row:last-child{border-bottom:none}
    .msg-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);flex-shrink:0;margin-top:.3rem}
    .msg-dot.read{background:transparent;border:1px solid var(--muted)}
    .msg-info h4{font-family:var(--fh);font-size:.85rem;font-weight:700;margin-bottom:.15rem}
    .msg-info p{font-size:.78rem;color:var(--muted);line-height:1.4}
    .msg-info .msg-sub{font-size:.72rem;color:var(--accent);margin-bottom:.15rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
    .msg-date{font-size:.7rem;color:var(--muted);margin-left:auto;flex-shrink:0}
    /* ── REVENUE SPLIT ── */
    .rev-split{display:flex;align-items:center;gap:1rem;margin-top:1rem;flex-wrap:wrap}
    .rev-item{flex:1;min-width:130px;background:var(--surface);border-radius:12px;padding:1rem;text-align:center;border:1px solid var(--border)}
    .rev-item .rv{font-family:var(--fh);font-size:1.3rem;font-weight:800;margin-bottom:.2rem}
    .rev-item .rl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    /* ── EMPTY STATE ── */
    .empty{text-align:center;padding:2rem;color:var(--muted)}
    .empty i{font-size:2rem;display:block;margin-bottom:.7rem;opacity:.3}
    /* ── MOBILE NAV TOGGLE ── */
    .menu-toggle{display:none;background:var(--card);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;align-items:center;justify-content:center;font-size:1rem;cursor:pointer}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;backdrop-filter:blur(4px)}
    /* ── TOAST ── */
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);color:var(--text);padding:.7rem 1.4rem;border-radius:50px;font-size:.85rem;z-index:500;transition:transform .3s,opacity .3s;opacity:0;display:flex;align-items:center;gap:.5rem;box-shadow:0 8px 28px rgba(0,0,0,.4)}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .toast i{color:var(--accent3)}
    /* ── TABS ── */
    .view-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
    .vt{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:.45rem 1.1rem;border-radius:50px;font-size:.8rem;cursor:pointer;transition:all .2s;font-family:var(--fb)}
    .vt.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    /* ── RESPONSIVE ── */
    @media(max-width:900px){
      .sidebar{transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .sidebar-overlay.open{display:block}
      .main{margin-left:0}
      .menu-toggle{display:flex}
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .content{padding:1.2rem}
      .topbar{padding:.8rem 1.2rem}
    }
    @media(max-width:480px){
      .stats-grid{grid-template-columns:1fr 1fr}
      .stat-val{font-size:1.4rem}
      .two-col-grid{grid-template-columns:1fr}
    }
    .two-col-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
    @media(max-width:700px){.two-col-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <a href="index.html">Cours<span>ili</span></a>
    <p>Instructor Dashboard</p>
  </div>
  <div class="sidebar-user">
    <div class="su-avatar" id="suAvatar"></div>
    <div class="su-info">
      <div class="name" id="suName">Loading…</div>
      <div class="role-badge" id="suRole">instructor</div>
    </div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">Dashboard</div>
    <button class="nav-item active" onclick="showView('overview')"><i class="fas fa-chart-pie"></i> Overview</button>
    <button class="nav-item" onclick="showView('courses')"><i class="fas fa-graduation-cap"></i> My Courses</button>
    <button class="nav-item" onclick="showView('students')"><i class="fas fa-users"></i> Students</button>
    <div class="nav-section">Reports</div>
    <button class="nav-item" onclick="showView('revenue')"><i class="fas fa-dollar-sign"></i> Revenue</button>
    <button class="nav-item" onclick="showView('messages')"><i class="fas fa-envelope"></i> Messages <span class="nav-badge" id="unreadBadge">0</span></button>
    <div class="nav-section">Site</div>
    <a class="nav-item" href="coursili.html"><i class="fas fa-book-open"></i> All Courses</a>
    <a class="nav-item" href="shop.html"><i class="fas fa-store"></i> Shop</a>
  </div>
  <div class="sidebar-footer">
    <a class="btn-home" href="index.html"><i class="fas fa-home"></i> Back to Website</a>
    <button class="btn-signout" onclick="signOut()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
  </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:.8rem">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1 id="topbarTitle">Overview</h1>
    </div>
    <div class="topbar-right">
      <span class="topbar-date" id="topbarDate"></span>
    </div>
  </div>

  <div class="content" id="mainContent">
    <!-- rendered by JS -->
  </div>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script>
  /* ── ACCESS CONTROL ── */
  const sess = CoursiliDB.users.getSession();
  if (!sess || !sess.loggedIn) { window.location.href = 'auth.html'; }
  if (sess && sess.role === 'student') { window.location.href = 'index.html'; }

  /* ── INIT UI ── */
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  document.getElementById('topbarDate').textContent = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('suAvatar').textContent = sess.avatar_initial || sess.name[0];
  document.getElementById('suAvatar').style.background = sess.avatar_gradient || 'linear-gradient(135deg,#6c63ff,#a78bfa)';
  document.getElementById('suName').textContent = sess.name;
  document.getElementById('suRole').textContent = sess.role;

  /* unread badge */
  const unread = CoursiliDB.messages.getUnread().length;
  document.getElementById('unreadBadge').textContent = unread;
  if (!unread) document.getElementById('unreadBadge').style.display = 'none';

  /* ── SIDEBAR TOGGLE ── */
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  }

  /* ── TOAST ── */
  function toast(msg) {
    document.getElementById('toastMsg').textContent = msg;
    const t = document.getElementById('toast'); t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
  }

  /* ── SIGN OUT ── */
  function signOut() { CoursiliDB.users.clearSession(); window.location.href = 'auth.html'; }

  /* ── DATA ── */
  const isAdmin = sess.role === 'admin';
  const allCourses = isAdmin ? CoursiliDB.courses.getAll() : CoursiliDB.courses.getByInstructor(sess.id);
  const allEnrollments = CoursiliDB.enrollments.getAll();
  const myEnrollments = isAdmin ? allEnrollments : allEnrollments.filter(e => allCourses.some(c=>c.id===e.course_id));
  const totalRevenue = myEnrollments.reduce((s,e)=>s+e.price_paid,0);
  const myShare = Math.round(totalRevenue * 0.8);
  const totalStudents = myEnrollments.length;
  const allMessages = CoursiliDB.messages.getAll();

  /* ── VIEWS ── */
  let curView = 'overview';
  function showView(v) {
    curView = v;
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    const titles = {overview:'Overview',courses:'My Courses',students:'Students',revenue:'Revenue',messages:'Messages'};
    document.getElementById('topbarTitle').textContent = titles[v] || v;
    // highlight nav
    document.querySelectorAll('.nav-item').forEach(n=>{ if(n.textContent.trim().toLowerCase().startsWith(v.toLowerCase())) n.classList.add('active'); });
    const c = document.getElementById('mainContent');
    if(v==='overview') c.innerHTML = renderOverview();
    else if(v==='courses') c.innerHTML = renderCourses();
    else if(v==='students') c.innerHTML = renderStudents();
    else if(v==='revenue') c.innerHTML = renderRevenue();
    else if(v==='messages') c.innerHTML = renderMessages();
    // draw charts after render
    if(v==='overview'||v==='revenue') drawCharts();
  }

  /* ── OVERVIEW ── */
  function renderOverview() {
    const completed = myEnrollments.filter(e=>e.completed||e.progress>=100).length;
    return `
    <div class="stats-grid">
      <div class="stat-card c1">
        <div class="stat-icon"><i class="fas fa-graduation-cap"></i></div>
        <div class="stat-val">${allCourses.filter(c=>c.is_published).length}</div>
        <div class="stat-lbl">Published Courses</div>
        <div class="stat-change up"><i class="fas fa-arrow-up"></i> Active & live</div>
      </div>
      <div class="stat-card c2">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div class="stat-val">${totalStudents}</div>
        <div class="stat-lbl">Total Enrollments</div>
        <div class="stat-change up"><i class="fas fa-arrow-up"></i> Across all courses</div>
      </div>
      <div class="stat-card c3">
        <div class="stat-icon"><i class="fas fa-coins"></i></div>
        <div class="stat-val">${totalRevenue.toLocaleString()}</div>
        <div class="stat-lbl">Total Revenue (TND)</div>
        <div class="stat-change up"><i class="fas fa-arrow-up"></i> Gross earnings</div>
      </div>
      <div class="stat-card c4">
        <div class="stat-icon"><i class="fas fa-wallet"></i></div>
        <div class="stat-val">${myShare.toLocaleString()}</div>
        <div class="stat-lbl">Your Share (TND)</div>
        <div class="stat-change up"><i class="fas fa-arrow-up"></i> 80% of revenue</div>
      </div>
    </div>

    <div class="two-col-grid">
      <div class="section-card">
        <h2><i class="fas fa-chart-bar"></i> Monthly Revenue (TND)</h2>
        <div class="chart-wrap" id="revenueChart"></div>
        <div class="chart-labels">${MONTHS.map(m=>`<span>${m}</span>`).join('')}</div>
      </div>
      <div class="section-card">
        <h2><i class="fas fa-graduation-cap"></i> Top Courses</h2>
        ${allCourses.slice(0,4).map(c=>{
          const enr = myEnrollments.filter(e=>e.course_id===c.id).length;
          const rev = myEnrollments.filter(e=>e.course_id===c.id).reduce((s,e)=>s+e.price_paid,0);
          return `<div class="student-row">
            <div style="font-size:1.5rem">${c.thumbnail_emoji}</div>
            <div style="flex:1;min-width:0">
              <div class="s-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.title}</div>
              <div class="s-email">${enr} students</div>
            </div>
            <div class="s-price">${rev} TND</div>
          </div>`;
        }).join('') || '<div class="empty"><i class="fas fa-book"></i>No courses yet</div>'}
      </div>
    </div>

    <div class="section-card">
      <h2><i class="fas fa-users"></i> Recent Enrollments</h2>
      ${renderRecentEnrollments(5)}
    </div>`;
  }

  /* ── COURSES VIEW ── */
  function renderCourses() {
    return `
    <div class="section-card">
      <h2><i class="fas fa-graduation-cap"></i> Your Courses (${allCourses.length})</h2>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th></th><th>Title</th><th>Category</th><th>Price</th><th>Students</th><th>Revenue</th><th>Rating</th><th>Status</th>
          </tr></thead>
          <tbody>
            ${allCourses.map(c=>{
              const enr = myEnrollments.filter(e=>e.course_id===c.id).length;
              const rev = myEnrollments.filter(e=>e.course_id===c.id).reduce((s,e)=>s+e.price_paid,0);
              return `<tr>
                <td class="course-emoji-cell">${c.thumbnail_emoji}</td>
                <td><strong style="font-family:var(--fh);font-size:.85rem">${c.title}</strong><br><span style="font-size:.72rem;color:var(--muted)">${c.lessons_count} lessons · ${c.duration_hours}h</span></td>
                <td><span style="text-transform:capitalize;font-size:.78rem;color:var(--accent)">${c.category}</span></td>
                <td style="font-family:var(--fh);font-weight:700;color:var(--accent3)">${c.price} TND</td>
                <td><div class="prog-cell"><span>${enr}</span></div></td>
                <td style="font-family:var(--fh);font-weight:700;color:var(--accent3)">${rev.toLocaleString()} TND</td>
                <td>⭐ ${c.rating}</td>
                <td><span class="${c.is_published?'badge-pub':'badge-draft'}">${c.is_published?'Published':'Draft'}</span></td>
              </tr>`;
            }).join('') || '<tr><td colspan="8"><div class="empty"><i class="fas fa-book"></i>No courses yet</div></td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  /* ── STUDENTS VIEW ── */
  function renderStudents() {
    const users = CoursiliDB.users.getAll();
    return `
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card c1"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-val">${totalStudents}</div><div class="stat-lbl">Total Enrollments</div></div>
      <div class="stat-card c2"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-val">${myEnrollments.filter(e=>e.progress>=100).length}</div><div class="stat-lbl">Completed</div></div>
      <div class="stat-card c3"><div class="stat-icon"><i class="fas fa-spinner"></i></div><div class="stat-val">${myEnrollments.filter(e=>e.progress>0&&e.progress<100).length}</div><div class="stat-lbl">In Progress</div></div>
    </div>
    <div class="section-card">
      <h2><i class="fas fa-list"></i> All Enrollments</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Student</th><th>Course</th><th>Progress</th><th>Paid</th><th>Date</th></tr></thead>
          <tbody>
            ${myEnrollments.map(e=>{
              const u = users.find(u=>u.id===e.user_id);
              const c = allCourses.find(c=>c.id===e.course_id);
              if(!u||!c) return '';
              return `<tr>
                <td>
                  <div style="display:flex;align-items:center;gap:.6rem">
                    <div class="s-avatar" style="background:${u.avatar_gradient||'linear-gradient(135deg,#6c63ff,#a78bfa)'};width:28px;height:28px;font-size:.72rem">${u.avatar_initial||u.name[0]}</div>
                    <div>
                      <div style="font-size:.83rem;font-weight:500">${u.name}</div>
                      <div style="font-size:.72rem;color:var(--muted)">${u.email}</div>
                    </div>
                  </div>
                </td>
                <td style="font-size:.8rem">${c.thumbnail_emoji} ${c.title}</td>
                <td>
                  <div class="prog-cell">
                    <div class="prog-bar-sm"><div class="prog-fill-sm" style="width:${e.progress||0}%"></div></div>
                    <span style="font-size:.75rem;color:${e.progress>=100?'var(--accent3)':'var(--muted)'}">${e.progress||0}%</span>
                  </div>
                </td>
                <td style="font-family:var(--fh);font-weight:700;color:var(--accent3)">${e.price_paid} TND</td>
                <td style="font-size:.75rem;color:var(--muted)">${e.enrolled_at}</td>
              </tr>`;
            }).join('') || '<tr><td colspan="5"><div class="empty"><i class="fas fa-users"></i>No students yet</div></td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  /* ── REVENUE VIEW ── */
  function renderRevenue() {
    const platformFee = Math.round(totalRevenue * 0.2);
    return `
    <div class="section-card">
      <h2><i class="fas fa-chart-line"></i> Revenue Overview</h2>
      <div class="rev-split">
        <div class="rev-item"><div class="rv" style="color:var(--accent3)">${totalRevenue.toLocaleString()} TND</div><div class="rl">Gross Revenue</div></div>
        <div class="rev-item"><div class="rv" style="color:var(--accent2)">${platformFee.toLocaleString()} TND</div><div class="rl">Platform Fee (20%)</div></div>
        <div class="rev-item"><div class="rv" style="color:var(--accent3)">${myShare.toLocaleString()} TND</div><div class="rl">Your Earnings (80%)</div></div>
      </div>
    </div>
    <div class="section-card">
      <h2><i class="fas fa-chart-bar"></i> Monthly Revenue (TND)</h2>
      <div class="chart-wrap" id="revenueChart"></div>
      <div class="chart-labels">${MONTHS.map(m=>`<span>${m}</span>`).join('')}</div>
    </div>
    <div class="section-card">
      <h2><i class="fas fa-graduation-cap"></i> Revenue by Course</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th></th><th>Course</th><th>Students</th><th>Gross</th><th>Your Share</th></tr></thead>
          <tbody>
            ${allCourses.map(c=>{
              const enr = myEnrollments.filter(e=>e.course_id===c.id);
              const rev = enr.reduce((s,e)=>s+e.price_paid,0);
              return `<tr>
                <td style="font-size:1.3rem">${c.thumbnail_emoji}</td>
                <td style="font-family:var(--fh);font-size:.85rem;font-weight:700">${c.title}</td>
                <td>${enr.length}</td>
                <td style="font-family:var(--fh);font-weight:700;color:var(--accent3)">${rev.toLocaleString()} TND</td>
                <td style="font-family:var(--fh);font-weight:700;color:var(--accent)">${Math.round(rev*.8).toLocaleString()} TND</td>
              </tr>`;
            }).join('') || '<tr><td colspan="5"><div class="empty"><i class="fas fa-coins"></i>No revenue yet</div></td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  /* ── MESSAGES VIEW ── */
  function renderMessages() {
    return `
    <div class="section-card">
      <h2><i class="fas fa-envelope"></i> Messages (${allMessages.length})</h2>
      ${allMessages.length ? allMessages.map(m=>`
        <div class="msg-row" id="msgrow-${m.id}">
          <div class="msg-dot ${m.is_read?'read':''}"></div>
          <div class="msg-info" style="flex:1;min-width:0">
            <div class="msg-sub">${m.subject}</div>
            <h4>${m.name} <span style="font-size:.72rem;color:var(--muted);font-family:var(--fb);font-weight:300">&lt;${m.email}&gt;</span></h4>
            <p>${m.message}</p>
            ${m.phone?`<p style="margin-top:.3rem;font-size:.72rem;color:var(--accent)"><i class="fas fa-phone"></i> ${m.phone}</p>`:''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.4rem;flex-shrink:0">
            <span class="msg-date">${m.received_at}</span>
            ${!m.is_read?`<button onclick="markRead('${m.id}')" style="background:rgba(108,99,255,.12);border:none;color:var(--accent);font-size:.7rem;padding:.2rem .6rem;border-radius:50px;cursor:pointer;font-family:var(--fb)">Mark read</button>`:''}
          </div>
        </div>`).join('') : '<div class="empty"><i class="fas fa-inbox"></i>No messages yet</div>'}
    </div>`;
  }

  function markRead(id) {
    CoursiliDB.messages.markRead(id);
    const row = document.getElementById('msgrow-'+id);
    if(row){ row.querySelector('.msg-dot').className='msg-dot read'; row.querySelector('button')?.remove(); }
    toast('Message marked as read');
    const cnt = CoursiliDB.messages.getUnread().length;
    document.getElementById('unreadBadge').textContent = cnt;
    if(!cnt) document.getElementById('unreadBadge').style.display='none';
  }

  /* ── RECENT ENROLLMENTS ── */
  function renderRecentEnrollments(limit) {
    const users = CoursiliDB.users.getAll();
    const recent = [...myEnrollments].reverse().slice(0, limit);
    if(!recent.length) return '<div class="empty"><i class="fas fa-users"></i>No enrollments yet</div>';
    return recent.map(e=>{
      const u = users.find(u=>u.id===e.user_id);
      const c = allCourses.find(c=>c.id===e.course_id);
      if(!u||!c) return '';
      return `<div class="student-row">
        <div class="s-avatar" style="background:${u.avatar_gradient||'linear-gradient(135deg,#6c63ff,#a78bfa)'}">${u.avatar_initial||u.name[0]}</div>
        <div style="flex:1;min-width:0">
          <div class="s-name">${u.name}</div>
          <div class="s-email">${u.email}</div>
        </div>
        <div class="s-course">${c.thumbnail_emoji} ${c.title}</div>
        <div class="s-price">${e.price_paid} TND</div>
      </div>`;
    }).join('');
  }

  /* ── DRAW CHARTS ── */
  function drawCharts() {
    const el = document.getElementById('revenueChart');
    if (!el) return;
    // aggregate monthly revenue across my courses
    const monthlyTotals = new Array(12).fill(0);
    allCourses.forEach(c => {
      if (c.monthly_revenue) c.monthly_revenue.forEach((v,i)=>{ monthlyTotals[i]+=v; });
    });
    const max = Math.max(...monthlyTotals, 1);
    el.innerHTML = monthlyTotals.map((v,i)=>`
      <div class="chart-bar" style="height:${Math.max((v/max)*100,4)}%">
        <div class="tooltip">${MONTHS[i]}: ${v.toLocaleString()} TND</div>
      </div>`).join('');
  }

  /* ── START ── */
  showView('overview');
</script>
</body>
</html>
